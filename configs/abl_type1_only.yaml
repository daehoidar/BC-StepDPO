# BC-StepDPO 재학습 v3 — 정규화 강화 (드리프트/아티팩트 억제).
# v2(lr1e-4, beta0.1, ep3) 대비: lr↓ 5e-5, beta↑ 0.3, epochs↓ 2.
# 목적: 수학 정확도 개선은 유지하되 "Step 1-ray" 같은 텍스트 아티팩트 감소.

sft:
  use_lora: true
  lora_r: 32
  lora_alpha: 64
  lora_targets: ["q_proj", "v_proj", "o_proj", "k_proj", "gate_proj", "up_proj", "down_proj"]
  epochs: 6
  batch_size: 2
  grad_accum: 8
  gradient_checkpointing: true
  max_len: 1024
  lr: 5.0e-5
  warmup_steps: 50

# -------- BC-StepDPO (Stage 4) — 정규화 강화 --------
use_lora: true
lora_r: 32
lora_alpha: 64
lora_targets: ["q_proj", "v_proj", "o_proj", "k_proj"]

epochs: 2                  # 3 → 2 (ep1 수렴, 과적합↓)
batch_size: 2
grad_accum: 4
max_len: 1024
lr: 5.0e-5                 # 1e-4 → 5e-5 (드리프트↓)
weight_decay: 0.01
warmup_steps: 20
max_grad_norm: 1.0

beta: 0.3                  # 0.1 → 0.3 (KL 정규화↑ → π_ref에 가깝게, 아티팩트 억제)

# 재현성
seed: 42

# Ablation toggle (BC-StepDPO full)
disable_step_mask: false
disable_belief_token: false
disable_type2: true
